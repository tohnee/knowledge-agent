<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SemiKB · 半导体知识操作系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* OpenAI/Gemini-inspired tech palette: near-black canvas, soft surfaces, electric accents */
  --bg:#f6f7f9;
  --bg-grad1:#eef1f6;
  --surface:#ffffff;
  --surface2:#f9fafb;
  --surface3:#f1f3f7;
  --line:#e6e9ef;
  --line2:#d9dee7;
  --ink:#0d1117;
  --ink2:#1f2733;
  --muted:#5b6573;
  --faint:#8a93a3;
  --ghost:#aeb6c2;

  /* Gemini-style gradient accent (blue→violet→pink) */
  --g1:#4587f6;
  --g2:#7c5cf0;
  --g3:#c95bd6;
  --grad:linear-gradient(120deg,#4587f6 0%,#7c5cf0 48%,#c95bd6 100%);
  --grad-soft:linear-gradient(120deg,rgba(69,135,246,.12),rgba(124,92,240,.10),rgba(201,91,214,.10));

  /* semantic */
  --blue:#3b7ff5; --blue-soft:#eaf1fe;
  --violet:#7c5cf0; --violet-soft:#f0ecfe;
  --teal:#0fae9b; --teal-soft:#e3f7f3;
  --amber:#d98a1f; --amber-soft:#fdf2e0;
  --red:#e15a6d; --red-soft:#fdecef;
  --green:#23a06b; --green-soft:#e6f6ee;
  --pink:#c95bd6; --pink-soft:#fbecfd;

  /* tier colors */
  --official:#0fae9b;
  --analyst:#d98a1f;
  --rumor:#e15a6d;

  /* graph dark canvas */
  --graph:#0b0e14;
  --graph2:#11151f;
  --graph-line:#222a3a;
  --graph-ink:#dfe6f0;

  --shadow-sm:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.04);
  --shadow:0 4px 16px rgba(16,24,40,.07),0 2px 6px rgba(16,24,40,.04);
  --shadow-lg:0 24px 60px rgba(16,24,40,.13),0 8px 24px rgba(16,24,40,.07);
  --shadow-glow:0 0 0 1px rgba(124,92,240,.12),0 12px 40px rgba(124,92,240,.16);

  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  --display:'Sora','Inter',sans-serif;
  --r:14px; --r-lg:20px; --r-sm:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);color:var(--ink);overflow:hidden;font-size:14px;
  background:
    radial-gradient(1100px 600px at 88% -12%,rgba(124,92,240,.10),transparent 58%),
    radial-gradient(900px 500px at 8% -8%,rgba(69,135,246,.09),transparent 55%),
    radial-gradient(700px 500px at 60% 120%,rgba(201,91,214,.06),transparent 60%),
    linear-gradient(180deg,var(--bg-grad1),var(--bg));
  -webkit-font-smoothing:antialiased;
}
button,input,textarea,select{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:#cdd4df;border-radius:8px;border:3px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:#b3bccb;background-clip:padding-box}
::-webkit-scrollbar-track{background:transparent}

.app{height:100vh;display:grid;grid-template-rows:64px 1fr}

/* ============ Topbar ============ */
.topbar{
  display:flex;align-items:center;gap:16px;padding:0 20px;
  background:rgba(255,255,255,.82);backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid var(--line);position:relative;z-index:40;
}
.brand{display:flex;align-items:center;gap:12px;min-width:248px}
.logo{
  width:38px;height:38px;border-radius:11px;position:relative;flex:none;
  background:var(--grad);box-shadow:0 6px 20px rgba(124,92,240,.32);
  display:grid;place-items:center;
}
.logo svg{width:21px;height:21px}
.brand-title b{font-family:var(--display);font-size:17px;font-weight:700;letter-spacing:-.02em;display:block;line-height:1.1}
.brand-title small{font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase}
.kb-pill{
  display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:999px;
  background:var(--surface3);border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:500;
}
.kb-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px rgba(15,174,155,.16)}
.search{flex:1;max-width:520px;position:relative}
.search input{
  width:100%;border:1px solid var(--line2);background:var(--surface);border-radius:11px;
  padding:10px 44px 10px 40px;outline:none;color:var(--ink);font-size:13px;transition:.18s;
}
.search input:focus{border-color:var(--violet);box-shadow:0 0 0 4px rgba(124,92,240,.12)}
.search input::placeholder{color:var(--ghost)}
.search .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint);display:flex}
.search .kbd{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10px;color:var(--faint);border:1px solid var(--line2);border-radius:5px;padding:2px 6px}
.top-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.action-bell{
  position:relative;width:38px;height:38px;border-radius:10px;background:var(--surface3);
  border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);transition:.15s;
}
.action-bell:hover{background:var(--surface);box-shadow:var(--shadow-sm)}
.action-bell .badge{
  position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;border-radius:9px;
  background:var(--red);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;padding:0 4px;
  box-shadow:0 0 0 2px var(--surface);
}
.role-zone{display:flex;align-items:center;gap:9px}
.role-zone label{font-size:10px;color:var(--faint);font-family:var(--mono);letter-spacing:.1em}
.role-select{position:relative}
.role-select select{
  appearance:none;border:1px solid var(--line2);background:var(--surface);border-radius:10px;
  padding:8px 30px 8px 12px;color:var(--ink2);outline:none;font-weight:500;font-size:12.5px;cursor:pointer;transition:.15s;
}
.role-select select:focus{border-color:var(--violet)}
.role-select::after{content:"▾";position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;font-size:11px}
.clearance{font-family:var(--mono);font-size:10px;font-weight:600;padding:6px 11px;border-radius:999px;white-space:nowrap}
.clearance.clr-hidden{background:var(--surface3);color:var(--faint)}
.clearance.clr-masked{background:var(--amber-soft);color:var(--amber)}
.clearance.clr-summary{background:var(--violet-soft);color:var(--violet)}
.clearance.clr-clear{background:var(--teal-soft);color:var(--teal)}

/* ============ Layout ============ */
.main{display:grid;grid-template-columns:76px 312px 1fr;min-height:0}
@media(max-width:1240px){.main{grid-template-columns:72px 270px 1fr}}
.rail{
  padding:14px 11px;border-right:1px solid var(--line);
  background:rgba(255,255,255,.5);display:flex;flex-direction:column;gap:7px;
}
.nav-btn{
  height:56px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  color:var(--faint);transition:.16s;border:1px solid transparent;position:relative;
}
.nav-btn svg{width:20px;height:20px}
.nav-btn span{font-size:10.5px;font-weight:500}
.nav-btn:hover{background:var(--surface);color:var(--muted);box-shadow:var(--shadow-sm)}
.nav-btn.active{background:var(--ink);color:#fff;box-shadow:0 8px 22px rgba(13,17,23,.22)}
.nav-btn.active svg{filter:drop-shadow(0 0 6px rgba(124,92,240,.6))}
.nav-btn .nav-count{
  position:absolute;top:7px;right:11px;min-width:16px;height:16px;border-radius:8px;background:var(--grad);
  color:#fff;font-size:9px;font-weight:700;display:grid;place-items:center;padding:0 3px;
}
.rail-sep{height:1px;background:var(--line);margin:4px 8px}

.left{border-right:1px solid var(--line);background:rgba(255,255,255,.62);overflow:auto;backdrop-filter:blur(8px)}
.left-head{padding:18px 18px 13px;position:sticky;top:0;background:rgba(249,250,251,.92);backdrop-filter:blur(14px);z-index:5;border-bottom:1px solid var(--line)}
.left-head h3{font-family:var(--display);font-size:17px;font-weight:600;letter-spacing:-.02em}
.left-head p{font-size:11px;color:var(--faint);margin-top:3px;font-family:var(--mono)}
.left-body{padding:14px}

.stage{overflow:auto;min-width:0;position:relative}
.stage-inner{max-width:1180px;margin:0 auto;padding:26px 34px 90px}
.view{display:none}
.view.active{display:block;animation:fade .3s cubic-bezier(.2,.7,.2,1)}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ============ Page header ============ */
.page-title{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:22px}
.page-title .pt-eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--violet);display:flex;align-items:center;gap:9px;margin-bottom:11px}
.page-title .pt-eyebrow::before{content:"";width:22px;height:2px;border-radius:2px;background:var(--grad)}
.page-title h1{font-family:var(--display);font-size:30px;letter-spacing:-.035em;line-height:1.08;font-weight:700}
.page-title p{color:var(--muted);margin-top:9px;font-size:13.5px;max-width:760px;line-height:1.6}
.section{margin-top:26px}
.section-h{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:13px;display:flex;align-items:center;gap:11px}
.section-h::after{content:"";flex:1;height:1px;background:var(--line)}
.section-h .sh-tag{font-family:var(--sans);text-transform:none;letter-spacing:0;font-size:11px;color:var(--faint);background:var(--surface3);padding:2px 8px;border-radius:6px}

/* ============ Cards / common ============ */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm)}
.card.pad{padding:20px}
.card.glow{box-shadow:var(--shadow)}
.grid{display:grid;gap:14px}
.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}
@media(max-width:1240px){.grid.four{grid-template-columns:repeat(2,1fr)}.grid.three{grid-template-columns:1fr}}

.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;background:var(--surface3);border:1px solid var(--line);color:var(--muted);font-size:11.5px;font-weight:500}
.tag .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.tag.blue{background:var(--blue-soft);border-color:transparent;color:var(--blue)}
.tag.violet{background:var(--violet-soft);border-color:transparent;color:var(--violet)}
.tag.teal{background:var(--teal-soft);border-color:transparent;color:var(--teal)}
.tag.amber{background:var(--amber-soft);border-color:transparent;color:var(--amber)}
.tag.red{background:var(--red-soft);border-color:transparent;color:var(--red)}
.tag.green{background:var(--green-soft);border-color:transparent;color:var(--green)}
.tag.pink{background:var(--pink-soft);border-color:transparent;color:var(--pink)}
.tag.ink{background:var(--ink);border-color:transparent;color:#fff}
.tag-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}

.tier{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:7px;font-family:var(--mono);font-size:10px;font-weight:600}
.tier .d{width:6px;height:6px;border-radius:50%}
.tier.official{background:var(--teal-soft);color:var(--official)} .tier.official .d{background:var(--official)}
.tier.analyst{background:var(--amber-soft);color:var(--analyst)} .tier.analyst .d{background:var(--analyst)}
.tier.rumor{background:var(--red-soft);color:var(--rumor)} .tier.rumor .d{background:var(--rumor)}

.btn{
  display:inline-flex;align-items:center;gap:7px;border-radius:10px;padding:9px 15px;font-weight:600;font-size:13px;
  background:var(--ink);color:#fff;transition:.16s;box-shadow:var(--shadow-sm);
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.btn:active{transform:translateY(0)}
.btn.grad{background:var(--grad);box-shadow:0 8px 22px rgba(124,92,240,.28)}
.btn.secondary{background:var(--surface);color:var(--ink2);border:1px solid var(--line2);box-shadow:none}
.btn.secondary:hover{border-color:var(--violet);color:var(--violet)}
.btn.ghost{background:transparent;color:var(--violet);box-shadow:none;border:1px solid transparent}
.btn.ghost:hover{background:var(--violet-soft)}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:8px}
.btn.red{background:var(--red)}
.btn.teal{background:var(--teal)}
.btn:disabled{opacity:.42;cursor:not-allowed;transform:none!important;box-shadow:none}

.kpi{padding:17px 18px;border-radius:var(--r);border:1px solid var(--line);background:var(--surface);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--grad);opacity:.8}
.kpi .val{font-family:var(--display);font-size:26px;font-weight:700;letter-spacing:-.04em;color:var(--ink);line-height:1}
.kpi .val small{font-size:14px;color:var(--muted);font-weight:600}
.kpi .label{font-size:11.5px;color:var(--muted);margin-top:7px}
.kpi .trend{font-family:var(--mono);font-size:10px;margin-top:5px}
.kpi .trend.up{color:var(--green)} .kpi .trend.down{color:var(--red)}

table{width:100%;border-collapse:collapse}
th,td{padding:10px 11px;border-bottom:1px solid var(--line);font-size:12.5px;text-align:left;vertical-align:middle}
th{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);font-weight:600}
td{color:var(--ink2)}
tbody tr{transition:.12s}
tbody tr:hover{background:var(--surface2)}
.masked{color:var(--red);background:var(--red-soft);border:1px dashed rgba(225,90,109,.4);padding:2px 8px;border-radius:7px;font-family:var(--mono);font-size:11px}
.val-mono{font-family:var(--mono);font-size:12px}
.conf-bar{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px}
.conf-bar .track{width:42px;height:5px;border-radius:3px;background:var(--surface3);overflow:hidden}
.conf-bar .fill{height:100%;border-radius:3px;background:var(--grad)}

/* ============ Source / file cards ============ */
.upload-zone{
  border:1.5px dashed var(--line2);border-radius:var(--r);background:var(--surface);
  padding:20px 16px;text-align:center;cursor:pointer;margin-bottom:14px;transition:.18s;position:relative;overflow:hidden;
}
.upload-zone::after{content:"";position:absolute;inset:0;background:var(--grad-soft);opacity:0;transition:.2s}
.upload-zone:hover{border-color:var(--violet)}
.upload-zone:hover::after{opacity:1}
.upload-zone.drag{border-color:var(--violet);border-style:solid}
.upload-zone.drag::after{opacity:1}
.upload-zone>*{position:relative}
.upload-zone .uz-ic{width:42px;height:42px;border-radius:12px;background:var(--grad);display:grid;place-items:center;margin:0 auto 10px;box-shadow:0 6px 18px rgba(124,92,240,.28)}
.upload-zone .uz-ic svg{width:21px;height:21px}
.upload-zone b{font-size:13px;font-weight:600}
.upload-zone p{font-size:11px;color:var(--faint);font-family:var(--mono);margin-top:4px}
.fmt-row{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:9px}
.fmt{font-family:var(--mono);font-size:8.5px;font-weight:600;padding:2px 6px;border-radius:5px;background:var(--surface3);color:var(--muted)}

.file-card{padding:13px;border-radius:12px;border:1px solid var(--line);background:var(--surface);margin-bottom:10px;cursor:pointer;transition:.16s;position:relative}
.file-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);border-color:var(--line2)}
.file-card.active{border-color:var(--violet);box-shadow:var(--shadow-glow)}
.file-card.active::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:3px;background:var(--grad)}
.file-top{display:flex;align-items:flex-start;gap:10px}
.file-icon{width:32px;height:32px;border-radius:9px;background:var(--blue-soft);color:var(--blue);display:grid;place-items:center;flex:none}
.file-icon svg{width:17px;height:17px}
.file-icon.ctrl{background:var(--red-soft);color:var(--red)}
.file-name{font-weight:600;font-size:12.5px;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.file-meta{margin-top:9px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.mini{font-family:var(--mono);font-size:9.5px;padding:2px 6px;border-radius:6px;background:var(--surface3);color:var(--faint)}
.file-lock{position:absolute;top:11px;right:11px;color:var(--red);font-size:12px}

/* dynamic parse pipeline */
.proc-card{padding:13px;border-radius:12px;border:1px solid var(--line2);background:var(--surface);margin-bottom:10px;box-shadow:var(--shadow-sm)}
.pc-top{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.pc-ft{font-family:var(--mono);font-size:9px;font-weight:600;padding:3px 6px;border-radius:6px;background:var(--ink);color:#fff}
.pc-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-state{font-family:var(--mono);font-size:9.5px;font-weight:600}
.pc-state.parsing{color:var(--blue)} .pc-state.ready{color:var(--teal)} .pc-state.built{color:var(--violet)}
.stages{display:flex;align-items:flex-start;margin:6px 0 2px}
.stg{flex:1;text-align:center;position:relative}
.stg:not(:last-child)::after{content:"";position:absolute;top:10px;left:50%;right:-50%;height:2px;background:var(--line2);z-index:1;transition:.4s}
.stg.done:not(:last-child)::after{background:var(--grad)}
.stg .ring{width:21px;height:21px;border-radius:50%;border:2px solid var(--line2);background:var(--surface);margin:0 auto 5px;display:grid;place-items:center;font-size:9px;font-weight:700;color:var(--faint);position:relative;z-index:2;transition:.3s}
.stg.done .ring{border-color:transparent;background:var(--grad);color:#fff}
.stg.active .ring{border-color:var(--violet);color:var(--violet);animation:pulse 1.1s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(124,92,240,.3)}70%{box-shadow:0 0 0 7px rgba(124,92,240,0)}100%{box-shadow:0 0 0 0 rgba(124,92,240,0)}}
.stg .lbl{font-family:var(--mono);font-size:7.5px;color:var(--faint);line-height:1.25}
.stg.done .lbl,.stg.active .lbl{color:var(--muted)}
.build-wiki{width:100%;margin-top:11px;display:none}
.build-wiki.show{display:flex;justify-content:center;animation:fade .3s}

/* ============ Wiki / Object view ============ */
.obj-hero{display:flex;align-items:flex-start;gap:16px;margin-bottom:4px}
.obj-badge{width:52px;height:52px;border-radius:14px;flex:none;display:grid;place-items:center;font-family:var(--display);font-size:22px;font-weight:700;color:#fff;box-shadow:var(--shadow)}
.iface-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:8px;border:1px solid var(--line2);background:var(--surface);font-family:var(--mono);font-size:10.5px;color:var(--muted);font-weight:500}
.iface-chip.ctrl{border-color:rgba(225,90,109,.4);background:var(--red-soft);color:var(--red)}
.lead-def{font-family:var(--display);font-size:16px;line-height:1.7;color:var(--ink2);font-weight:500}

/* as-of temporal slider */
.temporal{background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--line2);border-radius:var(--r);padding:16px 18px;margin-top:14px}
.temporal-head{display:flex;align-items:center;gap:11px;margin-bottom:14px;flex-wrap:wrap}
.temporal-head b{font-family:var(--display);font-size:13.5px;font-weight:600}
.mode-toggle{display:inline-flex;background:var(--surface3);border-radius:9px;padding:3px;gap:2px}
.mode-toggle button{padding:5px 12px;border-radius:7px;font-size:11.5px;font-weight:600;color:var(--muted);transition:.15s}
.mode-toggle button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}
.mode-toggle button.on.asof{color:var(--violet)}
.slider-wrap{display:flex;align-items:center;gap:14px}
.slider-wrap input[type=range]{flex:1;-webkit-appearance:none;height:5px;border-radius:3px;background:linear-gradient(90deg,var(--g1),var(--g2));outline:none}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--violet);cursor:pointer;box-shadow:var(--shadow)}
.slider-wrap input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--violet);cursor:pointer}
.asof-readout{font-family:var(--mono);font-size:12px;font-weight:600;min-width:96px;text-align:center;padding:6px 10px;border-radius:8px;background:var(--violet-soft);color:var(--violet)}
.asof-note{margin-top:11px;font-size:11.5px;color:var(--amber);background:var(--amber-soft);border-radius:9px;padding:8px 11px;display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.asof-note.hide{display:none}

.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.link-card{border:1px solid var(--line);border-radius:11px;padding:11px 13px;background:var(--surface);cursor:pointer;transition:.16s}
.link-card:hover{border-color:var(--violet);box-shadow:var(--shadow);transform:translateY(-1px)}
.link-card .lt{font-family:var(--mono);font-size:10px;color:var(--violet);font-weight:600}
.link-card .lt .card-rel{color:var(--faint);font-weight:400}
.link-card .tg{font-size:13px;font-weight:600;margin-top:4px;display:flex;align-items:center;gap:7px}
.link-card .tg .arrow{color:var(--ghost)}
.link-card .lc-meta{font-family:var(--mono);font-size:9.5px;color:var(--faint);margin-top:4px}

.timeline{border-left:2px solid var(--line2);margin-left:7px;padding-left:18px}
.tl{position:relative;margin-bottom:15px}
.tl::before{content:"";position:absolute;left:-25px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--surface);border:2.5px solid var(--violet)}
.tl time{font-family:var(--mono);font-size:11px;color:var(--violet);font-weight:600}
.tl p{font-size:12.5px;color:var(--ink2);margin-top:3px}
.tl .tl-who{font-family:var(--mono);font-size:9.5px;color:var(--faint);margin-top:2px}

.action-deck{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px}
.act-btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line2);border-radius:10px;padding:9px 13px;background:var(--surface);color:var(--ink2);font-size:12.5px;font-weight:600;transition:.15s}
.act-btn:hover{border-color:var(--violet);background:var(--violet-soft);color:var(--violet)}
.act-btn.ctrl{border-color:rgba(225,90,109,.4);color:var(--red)}
.act-btn.ctrl:hover{background:var(--red-soft);border-color:var(--red)}
.act-btn.disabled{opacity:.4;cursor:not-allowed}
.act-btn.disabled:hover{border-color:var(--line2);background:var(--surface);color:var(--ink2)}
.act-btn .lk{font-size:11px}

.deny-card{border:1px dashed rgba(225,90,109,.45);background:var(--red-soft);border-radius:var(--r);padding:20px;display:flex;gap:15px;align-items:flex-start}
.deny-card .di{width:40px;height:40px;border-radius:11px;background:rgba(225,90,109,.15);color:var(--red);display:grid;place-items:center;flex:none;font-size:18px}
.deny-card b{color:var(--red);font-size:14px}
.deny-card p{color:var(--muted);font-size:12.5px;margin-top:4px;line-height:1.6}

/* ============ Ontology graph ============ */
.onto-toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.filters{display:flex;gap:7px;flex-wrap:wrap}
.fchip{font-family:var(--mono);font-size:10.5px;font-weight:500;padding:5px 11px;border-radius:8px;border:1px solid var(--line2);background:var(--surface);color:var(--muted);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;user-select:none}
.fchip:hover{border-color:var(--violet);color:var(--ink2)}
.fchip.on{background:var(--ink);color:#fff;border-color:transparent}
.fchip .d{width:8px;height:8px;border-radius:3px}
.fchip.ctrl-chip.on{background:var(--red);color:#fff}

.ontology-wrap{height:660px;position:relative;overflow:hidden;border-radius:var(--r-lg);border:1px solid var(--graph-line);
  background:
    radial-gradient(circle at 50% 42%,rgba(124,92,240,.10),transparent 52%),
    radial-gradient(circle at 80% 80%,rgba(69,135,246,.07),transparent 50%),
    linear-gradient(rgba(124,150,200,.045) 1px,transparent 1px) 0 0/36px 36px,
    linear-gradient(90deg,rgba(124,150,200,.045) 1px,transparent 1px) 0 0/36px 36px,
    var(--graph);
  box-shadow:0 30px 80px rgba(8,12,20,.35),inset 0 0 0 1px rgba(255,255,255,.02);
}
#ontoSvg{width:100%;height:100%;display:block;cursor:grab}
#ontoSvg:active{cursor:grabbing}
.node-label{font-family:var(--sans);font-size:11px;font-weight:700;fill:#eef3fa}
.node-type{font-family:var(--mono);font-size:8.5px;fill:#8896aa}
.edge-label{font-family:var(--mono);font-size:8.5px;fill:#6f7e93}

.onto-panel{position:absolute;right:16px;top:16px;width:230px;background:rgba(17,21,31,.92);border:1px solid var(--graph-line);border-radius:var(--r);padding:15px;color:var(--graph-ink);backdrop-filter:blur(14px);box-shadow:0 18px 44px rgba(0,0,0,.4)}
.onto-panel h4{font-family:var(--display);font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.onto-panel .layer{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px;font-size:11px;line-height:1.4}
.onto-panel .layer .ld{width:8px;height:8px;border-radius:2px;margin-top:4px;flex:none}
.onto-panel .layer b{color:#dfe6f0;font-weight:600}
.onto-panel .layer span{color:#93a1b5}

.onto-detail{position:absolute;left:16px;bottom:16px;width:300px;background:rgba(17,21,31,.95);border:1px solid var(--graph-line);border-radius:var(--r);color:var(--graph-ink);backdrop-filter:blur(14px);box-shadow:0 20px 50px rgba(0,0,0,.45);overflow:hidden;opacity:0;transform:translateY(12px);pointer-events:none;transition:.24s}
.onto-detail.show{opacity:1;transform:none;pointer-events:auto}
.od-head{padding:14px 15px;border-bottom:1px solid var(--graph-line);position:relative}
.od-type{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#8896aa}
.od-name{font-family:var(--display);font-size:17px;font-weight:600;margin-top:3px}
.od-x{position:absolute;right:12px;top:11px;color:#8896aa;cursor:pointer;font-size:17px;line-height:1}
.od-x:hover{color:#fff}
.od-body{padding:12px 15px;max-height:230px;overflow-y:auto}
.od-lbl{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:#7f8da1;margin:10px 0 5px}
.od-lbl:first-child{margin-top:0}
.od-ifaces{display:flex;flex-wrap:wrap;gap:5px}
.od-iface{font-family:var(--mono);font-size:9.5px;padding:2px 7px;border-radius:6px;background:rgba(124,92,240,.18);color:#c3b5f7}
.od-iface.ctrl{background:rgba(225,90,109,.18);color:#f0a8b3}
.od-prop{display:flex;justify-content:space-between;gap:8px;font-family:var(--mono);font-size:10.5px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.od-prop .k{color:#93a1b5} .od-prop .v{color:#dfe6f0;text-align:right} .od-prop .v.masked{color:#f0a8b3;background:none;border:none;padding:0}
.od-link{font-family:var(--mono);font-size:10px;color:#93a1b5;padding:3px 0}
.od-link b{color:#9db8f0;font-weight:600}
.od-open{display:block;text-align:center;padding:10px;font-size:11.5px;font-weight:600;background:rgba(124,92,240,.2);color:#c3b5f7;cursor:pointer;border-top:1px solid var(--graph-line)}
.od-open:hover{background:rgba(124,92,240,.32)}

/* ============ Charts ============ */
.chart-card{border:1px solid var(--line);border-radius:var(--r);background:var(--surface);padding:18px;margin:14px 0;box-shadow:var(--shadow-sm)}
.chart-title{font-family:var(--display);font-weight:600;font-size:14px;display:flex;align-items:center;gap:9px}
.chart-sub{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin:3px 0 14px}
.chart-card svg{width:100%;height:auto;overflow:visible}
.ch-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:11px;font-family:var(--mono);font-size:10.5px;color:var(--muted)}
.ch-legend span{display:flex;align-items:center;gap:6px}
.ch-legend i{width:11px;height:11px;border-radius:3px}
.axis{font-family:var(--mono);font-size:9.5px;fill:var(--faint)}
.bar-label{font-family:var(--mono);font-size:10px;fill:var(--ink2);font-weight:600}
.grid-line{stroke:var(--line);stroke-width:1}
.grid-line.zero{stroke:var(--line2)}

/* ============ Workshop ============ */
.ws-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.ws-tab{padding:9px 15px;border-radius:11px;border:1px solid var(--line2);background:var(--surface);font-size:12.5px;font-weight:600;color:var(--muted);transition:.15s;display:flex;align-items:center;gap:8px}
.ws-tab:hover{border-color:var(--violet);color:var(--ink2)}
.ws-tab.on{background:var(--ink);color:#fff;border-color:transparent;box-shadow:var(--shadow)}
.ws-tab .wt-ic{font-size:14px}

.hhi-gauge{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.gauge-svg{flex:none}
.hhi-detail{flex:1;min-width:200px}
.hhi-detail .hd-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.hhi-detail .hd-row .k{color:var(--muted)}
.hhi-detail .hd-row .v{font-family:var(--mono);font-weight:600}
.risk-badge{padding:4px 11px;border-radius:999px;font-size:11px;font-weight:700;font-family:var(--mono)}
.risk-critical{background:var(--red);color:#fff} .risk-high{background:var(--red-soft);color:var(--red)}
.risk-moderate{background:var(--amber-soft);color:var(--amber)} .risk-low{background:var(--green-soft);color:var(--green)}

.supplier-bar{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.supplier-bar:last-child{border-bottom:none}
.sb-name{width:120px;font-size:12px;font-weight:500;flex:none}
.sb-name .lk{color:var(--red);font-size:10px;margin-left:4px}
.sb-track{flex:1;height:22px;border-radius:7px;background:var(--surface3);overflow:hidden;position:relative}
.sb-fill{height:100%;border-radius:7px;display:flex;align-items:center;padding-left:9px;color:#fff;font-family:var(--mono);font-size:10.5px;font-weight:600;transition:width .8s cubic-bezier(.2,.7,.2,1)}

.queue-card{padding:15px;border-radius:var(--r);border:1px solid var(--line2);background:var(--surface);box-shadow:var(--shadow-sm);transition:.16s}
.queue-card:hover{box-shadow:var(--shadow)}
.qc-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.qc-title{font-family:var(--display);font-size:15px;font-weight:600;margin:10px 0 5px}
.qc-desc{color:var(--muted);font-size:12.5px;line-height:1.55}
.qc-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

/* ============ Ask ============ */
.ask-layout{display:grid;grid-template-columns:1fr 340px;gap:16px}
@media(max-width:1240px){.ask-layout{grid-template-columns:1fr}}
.chat-shell{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);min-height:600px;display:flex;flex-direction:column;overflow:hidden}
.chat-head{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,var(--surface),var(--surface2))}
.chat-head b{font-family:var(--display);font-size:14px;font-weight:600;display:flex;align-items:center;gap:9px}
.chat-head .ch-spark{width:24px;height:24px;border-radius:7px;background:var(--grad);display:grid;place-items:center}
.chat-body{flex:1;padding:20px;overflow:auto;display:flex;flex-direction:column;gap:14px}
.scope-note{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--surface3);border-radius:9px;padding:8px 11px;display:flex;align-items:center;gap:8px;line-height:1.5}
.scope-note .d{width:7px;height:7px;border-radius:50%;background:var(--teal);flex:none}
.msg{max-width:86%}
.msg.user{align-self:flex-end}
.msg.user .bubble{background:var(--ink);color:#fff;border-radius:14px 14px 4px 14px;padding:11px 14px;font-size:13px;line-height:1.6}
.msg.ai{align-self:flex-start}
.msg.ai .bubble{background:var(--surface2);border:1px solid var(--line);border-radius:14px 14px 14px 4px;padding:12px 14px;font-size:13px;line-height:1.65}
.msg .who{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:5px}
.cites{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.cite{font-family:var(--mono);font-size:9.5px;padding:3px 8px;border-radius:7px;background:var(--teal-soft);color:var(--teal);cursor:pointer;border:1px solid transparent;transition:.12s;font-weight:600}
.cite:hover{border-color:var(--teal)}
.filtered{font-family:var(--mono);font-size:9.5px;color:var(--red);margin-top:8px;display:flex;align-items:center;gap:6px;background:var(--red-soft);padding:6px 9px;border-radius:8px}
.chat-input{padding:14px 16px;border-top:1px solid var(--line);display:flex;gap:9px;background:var(--surface)}
.chat-input input{flex:1;border:1px solid var(--line2);border-radius:11px;padding:11px 14px;outline:none;background:var(--surface2);font-size:13px}
.chat-input input:focus{border-color:var(--violet);background:var(--surface)}
.side-tool{display:flex;flex-direction:column;gap:14px}
.suggest{display:flex;flex-direction:column;gap:7px}
.sg-btn{text-align:left;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-size:12px;color:var(--ink2);transition:.15s;display:flex;align-items:center;gap:9px}
.sg-btn:hover{border-color:var(--violet);background:var(--violet-soft);color:var(--violet)}
.sg-btn .sg-ic{font-size:13px}
.memory-form textarea{width:100%;min-height:78px;resize:vertical;border:1px solid var(--line2);border-radius:11px;padding:11px;background:var(--surface2);outline:none;color:var(--ink);font-size:12.5px}
.memory-form textarea:focus{border-color:var(--violet);background:var(--surface)}
.memory-form select{width:100%;border:1px solid var(--line2);border-radius:10px;padding:9px;margin:8px 0;background:var(--surface2);outline:none;font-size:12.5px}

/* ============ Generate / Studio ============ */
.model-bar{display:flex;align-items:center;gap:11px;flex-wrap:wrap;border:1px solid var(--line);border-radius:var(--r);padding:13px 16px;background:var(--surface);margin-bottom:16px}
.model-bar .mb-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.model-pick{display:flex;gap:7px;flex-wrap:wrap}
.mp{font-family:var(--mono);font-size:11px;font-weight:500;padding:7px 12px;border-radius:9px;border:1px solid var(--line2);background:var(--surface);color:var(--muted);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px}
.mp:hover{border-color:var(--violet);color:var(--ink2)}
.mp.on{background:var(--ink);color:#fff;border-color:transparent}
.mp .d{width:6px;height:6px;border-radius:50%;background:var(--teal)}
.mp .loc{font-size:8.5px;opacity:.7;background:rgba(255,255,255,.15);padding:1px 5px;border-radius:4px}
.mp:not(.on) .loc{background:var(--surface3)}

.gen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:13px}
.gen-card{border:1px solid var(--line);border-radius:var(--r);padding:18px 16px;background:var(--surface);cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.gen-card::after{content:"";position:absolute;right:-30px;top:-30px;width:80px;height:80px;border-radius:50%;background:var(--grad-soft);opacity:0;transition:.25s}
.gen-card:hover{border-color:var(--violet);transform:translateY(-2px);box-shadow:var(--shadow)}
.gen-card:hover::after{opacity:1}
.gen-card .gc-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;margin-bottom:11px;font-size:18px;position:relative}
.gen-card .gc-t{font-family:var(--display);font-size:15px;font-weight:600;position:relative}
.gen-card .gc-d{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.5;position:relative}
.gen-card .gc-out{font-family:var(--mono);font-size:8.5px;color:var(--faint);margin-top:10px;position:relative}

.scope-box,.chart-choices{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:11px}
@media(max-width:1240px){.scope-box,.chart-choices{grid-template-columns:repeat(2,1fr)}}
.scope-tile{padding:13px 14px;border:1px solid var(--line2);border-radius:12px;background:var(--surface);cursor:pointer;transition:.15s}
.scope-tile:hover{border-color:var(--violet)}
.scope-tile.on{border-color:var(--violet);background:var(--violet-soft);box-shadow:var(--shadow-glow)}
.scope-tile b{font-size:13px;font-weight:600}
.scope-tile p{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.45}

.gen-output{border:1px solid var(--line2);border-radius:var(--r-lg);background:var(--surface);box-shadow:var(--shadow);overflow:hidden;margin-top:18px}
.go-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--surface),var(--surface2))}
.go-t{font-family:var(--display);font-size:16px;font-weight:600;flex:1}
.go-meta{font-family:var(--mono);font-size:9.5px;color:var(--faint)}
.go-export{display:flex;gap:7px}
.exp-btn{font-family:var(--mono);font-size:11px;font-weight:600;padding:6px 12px;border-radius:8px;border:1px solid var(--line2);background:var(--surface);color:var(--muted);transition:.15s;display:flex;align-items:center;gap:6px}
.exp-btn:hover{border-color:var(--violet);color:var(--violet)}
.exp-btn.pdf:hover{border-color:var(--red);color:var(--red)}
.exp-btn.ppt:hover{border-color:var(--amber);color:var(--amber)}
.go-body{padding:22px 26px;max-height:600px;overflow-y:auto}
.go-body h3{font-family:var(--display);font-size:21px;font-weight:700;letter-spacing:-.02em}
.go-body .rpt-sub{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin:5px 0 18px;padding-bottom:13px;border-bottom:1px solid var(--line)}
.go-body h4{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--violet);margin:22px 0 10px;display:flex;align-items:center;gap:9px}
.go-body h4::before{content:"";width:16px;height:2px;border-radius:2px;background:var(--grad)}
.go-body p{font-size:13px;line-height:1.75;color:var(--ink2);margin-bottom:10px}
.gen-loading{text-align:center;padding:46px 20px}
.gl-spin{width:34px;height:34px;border:3px solid var(--line2);border-top-color:var(--violet);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.gl-txt{font-family:var(--mono);font-size:12px;color:var(--muted)}
.gl-step{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:7px}

/* ============ Action Modal ============ */
.modal-overlay{position:fixed;inset:0;background:rgba(13,17,23,.5);backdrop-filter:blur(4px);z-index:80;display:none;align-items:center;justify-content:center;padding:20px;animation:fade .2s}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);max-width:560px;width:100%;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;animation:modalin .3s cubic-bezier(.2,.7,.2,1)}
@keyframes modalin{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:13px}
.modal-head .mh-ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:none;font-size:17px}
.modal-head .mh-ic.normal{background:var(--violet-soft);color:var(--violet)}
.modal-head .mh-ic.ctrl{background:var(--red-soft);color:var(--red)}
.modal-head h3{font-family:var(--display);font-size:17px;font-weight:600}
.modal-head .mh-sub{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:3px}
.modal-head .mh-x{margin-left:auto;color:var(--faint);font-size:20px;cursor:pointer;line-height:1}
.modal-head .mh-x:hover{color:var(--ink)}
.modal-body{padding:18px 20px;overflow-y:auto}
.act-spec{margin-bottom:16px}

const TIER_WEIGHT={official:3, analyst:2, rumor:1};

// Function 1: resolve_property_conflict
function resolvePropertyConflict(observations){
  const eligible=observations.filter(o=>o.sourceTier!=='rumor');
  if(!eligible.length) return {status:'pending_review', reason:'仅有 rumor 来源'};
  const winner=eligible.slice().sort((a,b)=>{
    if(TIER_WEIGHT[b.sourceTier]!==TIER_WEIGHT[a.sourceTier]) return TIER_WEIGHT[b.sourceTier]-TIER_WEIGHT[a.sourceTier];
    if(b.asOf!==a.asOf) return b.asOf>a.asOf?1:-1;
    return b.confidence-a.confidence;
  })[0];
  return {status:'resolved', value:winner.value, source:winner};
}

// Function 3: supply_concentration — real HHI
function supplyConcentration(suppliers){
  // suppliers: [{name, share(0-1), controlled}]
  const shares=suppliers.map(s=>s.share).filter(x=>x!=null);
  if(!shares.length) return {status:'insufficient_data'};
  const hhi=Math.round(shares.reduce((a,x)=>a+(x*100)**2,0));
  const top1=Math.max(...shares);
  const sorted=shares.slice().sort((a,b)=>b-a);
  const top3=sorted.slice(0,3).reduce((a,b)=>a+b,0);
  let risk = (hhi>2500 && top1>0.5) ? 'critical' : hhi>2500 ? 'high' : hhi>1500 ? 'moderate' : 'low';
  return {hhi, top1, top3, risk, suppliers,
    controlled:suppliers.filter(s=>s.controlled).map(s=>s.name)};
}

// recency weight for confidence aggregation

========================================================================== */
const PARSE_STAGES=[{lbl:'上传'},{lbl:'MinerU\nIngest'},{lbl:'Deep Read\nTOC'},{lbl:'Retrieve\nIndex'},{lbl:'Wiki\nReady'}];
const FT_TIER={pdf:'analyst',docx:'rumor',doc:'rumor',pptx:'analyst',ppt:'analyst',xlsx:'official',xls:'official',md:'analyst',txt:'rumor',csv:'official',html:'rumor'};
function bindUpload(){
  const uz=$('uploadZone'); if(!uz)return;
  uz.onclick=()=>$('fileInput').click();
  uz.ondragover=e=>{e.preventDefault();uz.classList.add('drag');};
  uz.ondragleave=()=>uz.classList.remove('drag');
  uz.ondrop=e=>{e.preventDefault();uz.classList.remove('drag');handleFiles(e.dataTransfer.files);};
}
function handleFiles(list){
  const arr=[...list]; if(!arr.length)return;
  arr.forEach(file=>{
    const ft=(file.name.split('.').pop()||'FILE').toLowerCase();
    const job={id:'job_'+Math.random().toString(36).slice(2,8), name:file.name, ft:ft.toUpperCase(), stage:0, done:false, built:false};
    procJobs.unshift(job); runParse(job);
  });
  if(activeNav!=='sources'){activeNav='sources';switchNav('sources');}
  renderProcList();
  toast(`已上传 <b>${arr.length}</b> 个文件 · 自动调用 MinerU 解析中…`);
}
function runParse(job){
  const tick=()=>{
    if(job.stage<PARSE_STAGES.length-1){ job.stage++; renderProcList(); setTimeout(tick, 620+Math.random()*420); }
    else { job.done=true; renderProcList(); }
  };
  setTimeout(tick, 480);
}
function renderProcList(){
  const el=$('procList'); if(!el)return;
  el.innerHTML=procJobs.map(j=>{
    const stages=PARSE_STAGES.map((s,i)=>{
      const done=j.done||i<j.stage, active=!j.done&&i===j.stage;
      return `<div class="stg ${done?'done':''} ${active?'active':''}">
        <div class="ring">${done?'✓':active?'◴':i+1}</div>
        <div class="lbl">${s.lbl.replace('\n','<br>')}</div></div>`;
    }).join('');
    const stateCls=j.built?'built':j.done?'ready':'parsing';
    const stateTxt=j.built?'wiki built':j.done?'解析完成':'解析中';
    return `<div class="proc-card">
      <div class="pc-top"><span class="pc-ft">${j.ft}</span><span class="pc-name">${j.name}</span>
        <span class="pc-state ${stateCls}">${stateTxt}</span></div>
      <div class="stages">${stages}</div>
      <button class="btn grad sm build-wiki ${j.done&&!j.built?'show':''}" data-build="${j.id}">⚡ 一键构建 Wiki (LLM-Wiki)</button>
    </div>`;
  }).join('');
  el.querySelectorAll('[data-build]').forEach(b=>b.onclick=()=>buildUploadedWiki(b.dataset.build));
}

function buildUploadedWiki(jobId){

  showBuildOverlay(job, ()=>{
    const tpl=BUILT_TEMPLATES[builtCount%BUILT_TEMPLATES.length];
    const newId='OBJ'+(builtCount++);
    const tier=FT_TIER[job.ft.toLowerCase()]||'analyst';
    const srcId='us_'+job.id;
    files.unshift({id:srcId, name:job.name, title:'用户上传 · '+job.name, source:'用户上传',
      date:new Date().toLocaleDateString('zh-CN'), type:'上传文档', size:'—', tier, parsed:true, wikiBuilt:true,
      controlled:tpl.controlled, derived:newId,
      abstract:'用户上传文档，已完成 MinerU 解析、整章 Deep Read、检索索引与 Wiki Object 实例化。',
      facts:['MinerU 解析完成','候选实体/属性/关系已抽取','已进入本体资产池']});
    wikiPages[newId]={id:newId, type:tpl.type, title:tpl.title, src:srcId, confidence:.76, controlled:tpl.controlled,
      interfaces:tpl.interfaces, summary:tpl.summary,
      facts:tpl.facts.map(f=>[...f, srcId]),
      entities:tpl.entities,
      links:tpl.links,
      timeline:[['刚刚','LLM-Wiki 构建 · Object 实例化','genmodel · '+activeModel]]};
    const pos=FREE_POS[(builtCount-1)%FREE_POS.length];
    ontoNodes.push({id:newId, x:pos.x, y:pos.y, r:28});
    tpl.links.forEach(l=>{if(wikiPages[l.to])ontoEdges.push({s:newId,t:l.to,lt:l.lt});});

function bitemporalAt(bt, year){
  // "what we knew at decision time": txTime <= year, latest by validTime then txTime
  const q = year+'-Q'+(year===2024?1:1);
  const cand=bt.observations.filter(o=>parseInt(o.txTime)<=year);
  if(!cand.length)return null;
  return cand.sort((a,b)=>{
    if(a.validTime!==b.validTime) return a.validTime>b.validTime?-1:1;
    return a.txTime>b.txTime?-1:1;
  })[0];
}
function updateAsofNote(bt){
  const note=$('asofNote'); if(!note||asOfMode!=='asof')return;
  const known=bitemporalAt(bt, asOfYear);
  const truth=bt.observations.filter(o=>!o.superseded).slice(-1)[0];
  if(known&&truth&&known.value!==truth.value){
    note.innerHTML=`⚠️ <span>当时（${asOfYear}）所知产能为 <b>${known.value}</b>（${known.tier} 来源）。事后经 ReviseCapacity 修正，真值为 <b>${truth.value}</b>。双时间轴保留两条记录，用于还原决策依据与审计。</span>`;
    note.classList.remove('hide');
  } else { note.classList.add('hide'); }
}

function openActionModal(act, w){
  const spec=ACTION_SPEC[act]; if(!spec)return;
  const fieldsHtml=spec.fields.map(f=>{
    if(f.t==='select') return `<div class="field-row"><label>${f.l}</label><select>${f.o.map(o=>`<option>${o}</option>`).join('')}</select></div>`;
    if(f.t==='textarea') return `<div class="field-row"><label>${f.l}</label><textarea rows="2" placeholder="${f.l}…">${f.v||''}</textarea></div>`;
    return `<div class="field-row"><label>${f.l}</label><input placeholder="${f.l}…" value="${f.v||''}"></div>`;
  }).join('');
  const checksHtml=spec.checks.map(c=>`<div class="check-item"><span class="ck ${c[1]?'':'warn'}">${c[1]?'✓':'!'}</span>${c[0]}</div>`).join('');
  const changesHtml=spec.changes.map(c=>`<div class="effect-item"><span class="ei">→</span>${c}</div>`).join('');
  const effectsHtml=spec.effects.map(e=>`<div class="effect-item"><span class="ei">⚡</span>${e}</div>`).join('');

  $('modal').innerHTML=`
    <div class="modal-head">
      <div class="mh-ic ${spec.ctrl?'ctrl':'normal'}">${spec.ctrl?'🔒':'⚙'}</div>
      <div><h3>${spec.title}</h3><div class="mh-sub">${spec.sub} · target: ${w.title.split(' (')[0]}</div></div>
      <span class="mh-x" id="modalX">×</span>
    </div>
    <div class="modal-body">
      <div class="act-spec"><div class="as-label"><span class="as-num">1</span>参数 Parameters</div>${fieldsHtml}</div>
      <div class="act-spec"><div class="as-label"><span class="as-num">2</span>校验 Validation</div><div class="check-list">${checksHtml}</div></div>
      ${spec.sandbox?`<div class="sandbox-note">⚠ <span>高风险操作 · 提交后将先进入<b>沙箱预演</b>，评估变更影响范围，经专家二次确认后才真正执行。</span></div>`:''}
      <div class="act-spec" style="margin-top:16px"><div class="as-label"><span class="as-num">3</span>变更 Changes</div><div class="effect-list">${changesHtml}</div></div>
      <div class="act-spec"><div class="as-label"><span class="as-num">4</span>副作用 Side Effects</div><div class="effect-list">${effectsHtml}</div></div>
    </div>

      <button class="btn ${spec.ctrl?'red':'grad'}" id="modalSubmit">${spec.sandbox?'提交沙箱预演':'执行 Action'}</button>
    </div>`;
  $('modalOverlay').classList.add('show');
  $('modalX').onclick=$('modalCancel').onclick=closeModal;
  $('modalSubmit').onclick=()=>{closeModal();commitAction(act, w, spec);};
}
function closeModal(){$('modalOverlay').classList.remove('show');}
function commitAction(act, w, spec){
  if(act==='mark'){
    w.controlled=true;
    if(!w.interfaces.some(i=>typeof i==='object'&&i.n==='IExportControlled'))
      w.interfaces.push({n:'IExportControlled',ctrl:true});
    actionQueue.unshift({id:'a'+Date.now(), type:'MarkExportControlled', target:w.title.split(' (')[0],
      status:'executed', risk:'high', desc:'IExportControlled 已叠加，实体迁入受控分区，访问收紧'});
    toast(`🔒 <b>MarkExportControlled</b> 已执行 · 迁入敏感分区 · 访问收紧 · 审计留痕`, true);
    renderRail(); renderWiki(); return;
  }
  if(act==='promote'){
    if(!ontoNodes.some(n=>n.id===w.id)){
      ontoNodes.push({id:w.id, x:200+Math.random()*560, y:130+Math.random()*340, r:30});
      w.links.forEach(l=>{if(wikiPages[l.to])ontoEdges.push({s:w.id,t:l.to,lt:l.lt});});
    }
    actionQueue.unshift({id:'a'+Date.now(), type:'PromoteToOntology', target:w.title.split(' (')[0],
      status:'pending', risk:'low', desc:'已进入沙箱预演，待专家确认后正式升格为 Object Type'});
    toast(`↑ <b>PromoteToOntology</b> 已进入沙箱预演 · 待专家确认`);
    renderRail(); return;
  }
  const labels={review:'ReviewWikiPage(approve)',correct:'CorrectEntity',merge:'MergeEntities'};
  if(act==='review') w.confidence=Math.min(1, w.confidence+0.03);
  actionQueue.unshift({id:'a'+Date.now(), type:spec.title, target:w.title.split(' (')[0],
    status:'executed', risk:'low', desc:'action committed through writeback dataset'});
  toast(`✓ <b>${labels[act]||spec.title}</b> 已提交 · 旧值版本化 · writeback 已记录`);
  renderRail(); renderWiki();
}

  } else {
    [...new Set(ontoNodes.map(n=>wikiPages[n.id]?.type).filter(Boolean))].forEach(t=>{ if(!(t in graphTypeFilters))graphTypeFilters[t]=true; });

function nodeVisible(id){

function drawGraph(){
  const svg=$('ontoSvg'); if(!svg)return;
  const pos=Object.fromEntries(ontoNodes.map(n=>[n.id,n]));
  let defs=`<defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#5a6a82"/></marker>
    <marker id="arrHi" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#9b87f5"/></marker>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>`;
  let edgeSvg='';
  ontoEdges.forEach(e=>{
    if(!nodeVisible(e.s)||!nodeVisible(e.t))return;
    const a=pos[e.s],b=pos[e.t]; if(!a||!b)return;
    const hi=highlightedPath&&((highlightedPath.s===e.s&&highlightedPath.t===e.t)||(highlightedPath.s===e.t&&highlightedPath.t===e.s));
    const isCtrl=e.lt==='subjectToControl';
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    edgeSvg+=`<g opacity="${highlightedPath&&!hi?0.16:1}">
      <line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${hi?'#9b87f5':(isCtrl?'#e15a6d':'#33405a')}"
        stroke-width="${hi?2.6:1.5}" stroke-dasharray="${isCtrl?'5 4':'0'}" marker-end="url(#${hi?'arrHi':'arr'})"/>
      <text class="edge-label" x="${mx}" y="${my-5}" text-anchor="middle" style="paint-order:stroke;stroke:#0b0e14;stroke-width:3px">${e.lt}</text></g>`;
  });
  let nodeSvg='';
  ontoNodes.forEach(n=>{
    if(!nodeVisible(n.id))return;
    const o=wikiPages[n.id]; const c=typeColor(o.type);
    const sel=n.id===activeNode;
    const dim=highlightedPath&&highlightedPath.s!==n.id&&highlightedPath.t!==n.id;
    const nm=o.title.split(' (')[0];
    nodeSvg+=`<g data-node="${n.id}" style="cursor:pointer" opacity="${dim?0.32:1}">
      <circle cx="${n.x}" cy="${n.y}" r="${n.r+8}" fill="${c}" opacity="0.10"/>
      <circle cx="${n.x}" cy="${n.y}" r="${n.r}" fill="#141826" stroke="${c}" stroke-width="${sel?3:1.8}" ${sel?'filter="url(#glow)"':''}/>
      <text class="node-label" x="${n.x}" y="${n.y-1}" text-anchor="middle" font-size="${nm.length>7?9.5:12}">${nm.length>9?nm.slice(0,8)+'…':nm}</text>
      <text class="node-type" x="${n.x}" y="${n.y+13}" text-anchor="middle">${o.type}</text>
      ${o.controlled?`<text x="${n.x+n.r-5}" y="${n.y-n.r+9}" font-size="13">🔒</text>`:''}</g>`;
  });
  svg.innerHTML=defs+edgeSvg+nodeSvg;
  svg.querySelectorAll('[data-node]').forEach(g=>g.onclick=()=>selectGraphNode(g.dataset.node));
}
function selectGraphNode(id){

const C={copper:'#d98a1f',teal:'#0fae9b',blue:'#3b7ff5',violet:'#7c5cf0',red:'#e15a6d',green:'#23a06b',pink:'#c95bd6'};
function svgWrap(inner,w=640,h=240){return `<svg viewBox="0 0 ${w} ${h}">${inner}</svg>`;}
function legend(items){return `<div class="ch-legend">${items.map(i=>`<span><i style="background:${i.c}"></i>${i.n}</span>`).join('')}</div>`;}

function barGroup(data,opts){
  const w=opts.w||640,h=opts.h||230,padL=46,padB=38,padT=14,padR=14,cw=w-padL-padR,ch=h-padT-padB;
  const max=opts.max||Math.max(...data.flatMap(d=>d.series.map(s=>s.val)))*1.15;
  const groups=data.length,gGap=22,gw=(cw-gGap*(groups-1))/groups,seriesN=data[0].series.length;
  const bw=Math.min(36,(gw-7*(seriesN-1))/seriesN);
  let g='';
  for(let i=0;i<=4;i++){const yv=max*i/4,y=padT+ch-ch*i/4;
    g+=`<line class="grid-line ${i===0?'zero':''}" x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}"/><text class="axis" x="${padL-6}" y="${y+3}" text-anchor="end">${yv.toFixed(yv<10?1:0)}</text>`;}
  data.forEach((d,gi)=>{const gx=padL+gi*(gw+gGap);
    d.series.forEach((s,si)=>{const bx=gx+(gw-(bw*seriesN+7*(seriesN-1)))/2+si*(bw+7);
      const bh=ch*s.val/max,by=padT+ch-bh;
      g+=`<rect x="${bx}" y="${padT+ch}" width="${bw}" height="0" rx="4" fill="${s.color}">
        <animate attributeName="height" from="0" to="${bh}" dur="0.65s" fill="freeze" begin="${gi*0.08+si*0.04}s"/>
        <animate attributeName="y" from="${padT+ch}" to="${by}" dur="0.65s" fill="freeze" begin="${gi*0.08+si*0.04}s"/></rect>
      <text class="bar-label" x="${bx+bw/2}" y="${by-5}" text-anchor="middle" opacity="0">${s.val}${opts.unit||''}
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="${gi*0.08+si*0.04+0.65}s"/></text>`;});
    g+=`<text class="axis" x="${gx+gw/2}" y="${h-padB+18}" text-anchor="middle">${d.label}</text>`;});
  return svgWrap(g,w,h);
}

function chartCapacityTimeline(){

}
function chartNodeConfidence(){

  const maxDen=2.6,X=v=>padL+cw*v,Y=v=>padT+ch-ch*v/maxDen;

  g+=`<text class="axis" x="${padL+cw/2}" y="${h-5}" text-anchor="middle">成熟度 →</text><text class="axis" x="14" y="${padT+ch/2}" transform="rotate(-90,14,${padT+ch/2})" text-anchor="middle">逻辑密度 →</text>`;
  nodes.forEach(nd=>{const r=10+nd.conf*22;

}

function ask(){
  const inp=$('askInput'),q=inp.value.trim(); if(!q)return; inp.value='';
  const body=$('chatBody');
  body.insertAdjacentHTML('beforeend',`<div class="msg user"><div class="bubble">${q}</div></div>`);
  const hit=QA.find(x=>x.re.test(q))||QA[QA.length-1];
  let ans=typeof hit.ans==='function'?hit.ans():hit.ans;
  if(hit.ctrl){ if(accessMode()==='clear')ans+=hit.ctrl; else ans+=`<div class="filtered">🔒 部分受控明细已按角色（${ROLES[role].label}）过滤 · 切换合规角色查看</div>`; }
  lastAnswer=ans.replace(/<[^>]+>/g,'');
  const cites=(hit.cites||[]).filter(id=>{const s=files.find(f=>f.id===id);return !(s&&s.controlled&&accessMode()==='hidden');});
  const citeHtml=cites.length?`<div class="cites">${cites.map(id=>{const s=files.find(f=>f.id===id);return `<span class="cite" data-cite="${id}">↩ ${s.name}${s.controlled?' 🔒':''}</span>`;}).join('')}</div>`:'';
  setTimeout(()=>{
    body.insertAdjacentHTML('beforeend',`<div class="msg ai"><div class="who">SemiKB · grounded</div><div class="bubble">${ans}${citeHtml}</div></div>`);
    body.querySelectorAll('.cite').forEach(c=>c.onclick=()=>{const sid=c.dataset.cite;if(files.find(f=>f.id===sid)){activeFile=sid;activeNav='sources';switchNav('sources');toast('↩ 已跳转至引用来源');}});
    const draft=$('wikiDraft'); if(draft)draft.value=lastAnswer;
    body.scrollTop=body.scrollHeight;
  },280);
  body.scrollTop=body.scrollHeight;
}

      <h4>本周新增来源</h4><p>来源 ${files.length} 份（含用户上传并建 Wiki ${built} 份）。层级分布：official ${files.filter(f=>f.tier==='official').length}、analyst ${files.filter(f=>f.tier==='analyst').length}、rumor ${files.filter(f=>f.tier==='rumor').length}。</p>
      <h4>关键事件</h4><p>· N3 状态确认 HVM（AdvanceRoadmap, official）。<br>· EUV 标记受出口管制（MarkExportControlled, 合规执行）。<br>· 代工厂A 产能修正 95K→120K（ReviseCapacity, 双时间轴）。</p>
      <h4>待审 Action</h4><p>当前 ${actionQueue.filter(a=>a.status==='pending').length} 条待审，含 ${actionQueue.filter(a=>a.risk==='high').length} 条高风险。EUV 单点依赖叠加管制列为最高优先风险项。</p>${filterNote}`;
  } else if(kind==='compare'){
    title='制程节点对比分析'; meta=`${activeModel} · ${today} · 多维度对比`;
    body=`<h3>制程节点对比分析</h3><div class="rpt-sub">N5 / N3 / N2 多维度对比</div>
      <h4>逻辑密度与性能（相对 N5）</h4>${chartNodeComparison()}
      <h4>成熟度 × 置信度</h4><p>N5/N3 以 official 来源为主；N2 含较多 analyst/rumor，气泡越小代表综合置信度越低。</p>${chartNodeConfidence()}${filterNote}`;
  } else {
    title='汇报演示 · 幻灯片大纲'; meta=`${activeModel} · ${today} · PPTX 大纲`;
    body=`<h3>先进制程竞争态势 · 汇报 PPT</h3><div class="rpt-sub">幻灯片大纲 + 配图建议</div>
      <h4>幻灯片 1 · 封面</h4><p>标题：先进制程竞争态势 ｜ 副标题：基于知识库的自动情报汇总 ｜ ${today}</p>
      <h4>幻灯片 2 · 核心结论</h4><div class="grid three"><div class="kpi"><div class="val">N3</div><div class="label">主力节点 HVM</div></div><div class="kpi"><div class="val">120<small>K</small></div><div class="label">月产能 WSPM</div></div><div class="kpi"><div class="val">双重</div><div class="label">EUV 卡脖子+管制</div></div></div>
      <h4>幻灯片 3 · 节点对比（配图）</h4>${chartNodeComparison()}
      <h4>幻灯片 4 · 供应链风险（配图）</h4>${hhiGauge(supplyConcentration([{name:'设备商D',share:1.0,controlled:true}]),'EUV 光刻机')}
      <h4>幻灯片 5 · 行动建议</h4><p>建立替代源测绘 · 管制暴露持续监控 · 低置信数据补充 official 来源。</p>${filterNote}`;
  }
  out.innerHTML=`<div class="gen-output">
    <div class="go-head"><div class="go-t">${title}</div><div class="go-meta">${meta}</div>
      <div class="go-export">
        <span class="exp-btn pdf" data-exp="PDF">⬇ PDF</span><span class="exp-btn ppt" data-exp="PPT">⬇ PPT</span>
        <span class="exp-btn" data-exp="Word">⬇ Word</span><span class="exp-btn" data-exp="MD">⬇ MD</span></div></div>
    <div class="go-body">${body}</div></div>`;
  out.querySelectorAll('[data-exp]').forEach(b=>b.onclick=()=>toast(`已生成 <b>${title}</b> 的 <b>${b.dataset.exp}</b> 文件 · 经文档生成服务导出（原型演示）`));
  animateBars();
  out&&out.scrollIntoView&&out.scrollIntoView({behavior:'smooth',block:'start'});
}

/* ==========================================================================
   DRAWER + SEARCH + BOOT
========================================================================== */
function renderDrawer(){
  $('drawerBody').innerHTML=actionQueue.map(a=>{
    const riskCls={high:'red',medium:'amber',low:'green'}[a.risk];
    return `<div class="drawer-item">
      <div class="di-top"><span class="di-type">${a.type}</span>
        <span class="tag ${riskCls}" style="margin-left:auto"><span class="d"></span>${a.risk}</span>
        <span class="tag ${a.status==='executed'?'teal':'violet'}"><span class="d"></span>${a.status}</span></div>
      <div class="di-target">${a.target}</div><div class="di-desc">${a.desc}</div>
      ${a.status==='pending'?`<div class="qc-actions" style="margin-top:10px"><button class="btn grad sm" data-dapprove="${a.id}">approve</button></div>`:''}
    </div>`;}).join('');
  $('drawerBody').querySelectorAll('[data-dapprove]').forEach(b=>b.onclick=()=>{approveAction(b.dataset.dapprove);renderDrawer();});
}
function wireSearch(){
  const inp=$('searchInput');
  inp.addEventListener('keydown',e=>{
    if(e.key!=='Enter')return;
    const q=inp.value.trim().toLowerCase(); if(!q)return;
    const w=Object.values(wikiPages).find(x=>x.title.toLowerCase().includes(q)||x.id.toLowerCase().includes(q)||x.summary.toLowerCase().includes(q)||x.entities.some(e=>e.toLowerCase().includes(q)));
    if(w){if(w.controlled&&accessMode()==='hidden'){toast('🔒 命中受控实体 · 无权',true);return;}activeNav='wiki';switchNav('wiki');openObject(w.id);toast(`跳转 Wiki · <b>${w.title.split(' (')[0]}</b>`);return;}
    const f=files.find(x=>x.title.toLowerCase().includes(q)||x.name.toLowerCase().includes(q));
    if(f){activeFile=f.id;activeNav='sources';switchNav('sources');toast(`跳转来源 · <b>${f.name}</b>`);return;}
    const n=ontoNodes.find(x=>x.id.toLowerCase().includes(q));
    if(n){activeNav='ontology';switchNav('ontology');selectGraphNode(n.id);toast(`跳转本体节点 · <b>${n.id}</b>`);return;}
    toast(`未找到「${inp.value}」· 试试 N3 / EUV / 代工厂 / 供应集中度`);
  });
  document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();inp.focus();}});
}
function boot(){
  renderRole(); renderRail(); switchNav('sources');
  $('fileInput').addEventListener('change',e=>{handleFiles(e.target.files);e.target.value='';});
  $('actionBell').onclick=()=>{renderDrawer();$('drawer').classList.add('show');};
  $('drawerClose').onclick=()=>$('drawer').classList.remove('show');
  $('modalOverlay').onclick=e=>{if(e.target===$('modalOverlay'))closeModal();};
  wireSearch();
  setTimeout(()=>toast('提示：切换右上角<b>角色</b>，观察受控字段/实体/Action 的权限变化'),900);
}
boot();

</script>
